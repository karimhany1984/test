<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<base target="_top">
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="إدارة متابعة المديريات">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a6faf">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').then(reg => {
                reg.update();
            }).catch(() => { /* sw.js not available in this environment — safe to ignore */ });
        });
    }
</script>
<title>إدارة متابعة المديريات</title>
<style>
/* Offline Arabic font stack - works without internet */
body { font-family: 'Segoe UI', 'Arial Unicode MS', 'Tahoma', 'Arial', sans-serif; }
</style>
<style>
    :root {
        --primary: #1a6faf;
        --primary-dark: #14578a;
        --primary-light: #e8f2fb;
        --primary-mid: #c6dff5;
        --accent: #e8a020;
        --accent-light: #fef3dc;
        --green: #1a8a4a;
        --green-light: #e3f5eb;
        --red: #c0392b;
        --red-light: #fdecea;
        --orange: #d35400;
        --orange-light: #fef0e7;
        --bg: #f0f4f8;
        --surface: #ffffff;
        --surface2: #f7f9fc;
        --border: #d4dde8;
        --border-light: #e8eef5;
        --text: #1a2533;
        --text-muted: #5a6a7e;
        --text-dim: #8a9ab0;
        --shadow-sm: 0 1px 4px rgba(26,111,175,0.08);
        --shadow: 0 2px 12px rgba(26,111,175,0.12);
        --shadow-lg: 0 4px 24px rgba(26,111,175,0.15);
        --radius: 12px;
        --radius-sm: 8px;
        --header-h: calc(60px + env(safe-area-inset-top, 0px));
        --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        --mob-nav-h: calc(58px + var(--safe-area-bottom));
    }

/* Reset & Base */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  height: 100%;
  
  min-height: -webkit-fill-available;
}
body.menu-open {
  overflow: hidden; /* lock scroll ONLY when menu open */
}
body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  direction: rtl;
  font-size: 14px;
}

.app-layout {
  min-height: -webkit-fill-available;
}

/* ========== HEADER ========== */
.app-header {
  position: fixed;
  top: 0;
  right: 0;
  left: 0;
  height: var(--header-h);
  background: var(--primary);
  display: flex;
  align-items: center;
  gap: 12px;
  padding: env(safe-area-inset-top, 0px) 16px 0 16px;
  z-index: 200;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
}

.header-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
  min-width: 0;
}

.header-logo .icon {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.header-titles {
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.header-titles .t1 {
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.header-titles .t2 {
  font-size: 10px;
  color: rgba(255, 255, 255, 0.75);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: none;
}

@media (min-width: 600px) {
  .header-titles .t2 { display: block; }
}

.header-actions {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-shrink: 0;
}

.hbtn {
  height: 34px;
  padding: 0 12px;
  border-radius: 7px;
  border: none;
  font-family: 'Cairo', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: all 0.15s;
  white-space: nowrap;
}

.hbtn-ghost { background: rgba(255, 255, 255, 0.15); color: #fff; }
.hbtn-ghost:hover, .hbtn-ghost:active { background: rgba(255, 255, 255, 0.25); }
.hbtn-white { background: #fff; color: var(--primary); }
.hbtn-white:hover, .hbtn-white:active { background: #e8f2fb; }
.hbtn-green { background: #27ae60; color: #fff; }
.hbtn-green:hover, .hbtn-green:active { background: #1e9050; }
.hbtn-accent { background: var(--accent); color: #fff; }
.hbtn-accent:hover, .hbtn-accent:active { background: #c8881a; }
.hbtn .icon-sm { font-size: 14px; }

@media (max-width: 599px) {
  .hbtn-desktop { display: none; }
}

/* ========== GLOBAL PROGRESS ========== */
.global-progress {
  position: fixed;
  top: var(--header-h);
  right: 0;
  left: 0;
  height: 4px;
  background: var(--primary-mid);
  z-index: 199;
}

.global-progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.4s;
}

/* ========== LAYOUT ========== */
.app-layout {
  position: fixed;
  top: calc(var(--header-h) + 4px);
  bottom: var(--mob-nav-h);
  right: 0;
  left: 0;
  display: flex;
}

@media (min-width: 768px) {
  .app-layout { bottom: 0; }
}

/* ========== SIDEBAR ========== */
.sidebar {
  width: 260px;
  flex-shrink: 0;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: transform 0.25s ease-in-out;
}

.sidebar-inner {
  overflow-y: auto;
  flex: 1;
  -webkit-overflow-scrolling: touch;
}

.sidebar-inner::-webkit-scrollbar { width: 4px; }
.sidebar-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }




@media (max-width: 360px) {
  .sidebar {
    width: 85%;
    max-width: 280px;
    min-width: 240px;
  }
}

.sidebar-head {
  padding: 12px 16px 8px;
  border-bottom: 1px solid var(--border-light);
  background: var(--primary-light);
  flex-shrink: 0;
}

.sidebar-head h3 {
  font-size: 12px;
  font-weight: 700;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.sidebar-total {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 6px;
  flex-wrap: wrap;
  gap: 6px;
}

.sidebar-total .score-big { font-size: 20px; font-weight: 900; color: var(--primary); }
.sidebar-total .score-max { font-size: 12px; color: var(--text-muted); }
.sidebar-total .pct-badge {
  font-size: 12px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 12px;
  background: var(--primary-light);
  color: var(--primary);
  white-space: nowrap;
}

/* Navigation Items */
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  cursor: pointer;
  border-bottom: 1px solid var(--border-light);
  transition: background 0.12s;
  position: relative;
  min-height: 44px;
}

.nav-item:hover { background: var(--primary-light); }
.nav-item.active {
  background: var(--primary-light);
  border-right: 3px solid var(--primary);
}

.nav-item .nav-icon {
  width: 30px;
  height: 30px;
  border-radius: 7px;
  background: var(--primary-light);
  color: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.nav-item.active .nav-icon { background: var(--primary); color: #fff; }
.nav-item .nav-text { flex: 1; min-width: 0; }
.nav-item .nav-title { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.3; }
.nav-item.active .nav-title { color: var(--primary); }
.nav-item .nav-sub { font-size: 10px; color: var(--text-dim); margin-top: 1px; }

.nav-pill {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 10px;
  flex-shrink: 0;
}

.pill-done { background: var(--green-light); color: var(--green); }
.pill-partial { background: var(--orange-light); color: var(--orange); }
.pill-empty { background: var(--border-light); color: var(--text-dim); }

/* ========== MAIN CONTENT ========== */
.main-content {
  flex: 1;
  overflow-y: auto;
  background: var(--bg);
  padding: 16px;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}
.main-content {
  overscroll-behavior-y: contain;
}


    

.main-content::-webkit-scrollbar { width: 6px; }
.main-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ========== HOME SCREEN ========== */
.home-screen { max-width: 900px; margin: 0 auto; }

.home-hero {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  border-radius: var(--radius);
  padding: 24px;
  color: #fff;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.home-hero .hero-icon { font-size: 40px; }
.home-hero h1 { font-size: 20px; font-weight: 900; margin-bottom: 4px; }
.home-hero p { font-size: 13px; opacity: 0.85; line-height: 1.6; }

/* Upload Card */
.upload-card {
  background: var(--surface);
  border: 2px dashed var(--primary-mid);
  border-radius: var(--radius);
  padding: 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 20px;
}

.upload-card:hover, .upload-card.drag-over {
  border-color: var(--primary);
  background: var(--primary-light);
}

.upload-card .up-icon { font-size: 32px; margin-bottom: 8px; }
.upload-card h3 { font-size: 15px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
.upload-card p { font-size: 12px; color: var(--text-muted); }
#fileInput { display: none; }

/* Meta Card */
.meta-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 20px;
}

.meta-card h2 {
  font-size: 14px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

@media (max-width: 499px) {
  .meta-grid { grid-template-columns: 1fr; }
}

.meta-field label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

.meta-field input, .meta-field select {
  width: 100%;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 9px 12px;
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  transition: border-color 0.15s;
}

.meta-field input:focus, .meta-field select:focus {
  outline: none;
  border-color: var(--primary);
  background: #fff;
}

.meta-field select option { background: #fff; }

/* Nav Grid */
.nav-grid-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-muted);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.nav-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}

.nav-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 12px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  gap: 6px;
  text-decoration: none;
  min-height: 44px;
}

.nav-card:hover, .nav-card:active {
  border-color: var(--primary);
  background: var(--primary-light);
  transform: translateY(-1px);
  box-shadow: var(--shadow);
}

.nav-card .nc-icon { font-size: 22px; }
.nav-card .nc-title { font-size: 12px; font-weight: 700; color: var(--text); line-height: 1.4; }
.nav-card .nc-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.nav-card .nc-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
.nc-fill-high { background: var(--green); }
.nc-fill-mid { background: var(--orange); }
.nc-fill-low { background: var(--red); }
.nc-fill-zero { background: var(--border); }
.nav-card .nc-score { font-size: 11px; color: var(--text-muted); }

/* ========== SECTION VIEW ========== */
.section-view { max-width: 900px; margin: 0 auto; }

.section-title-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
}

.stb-icon {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  background: var(--primary);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.stb-text { flex: 1; }
.stb-text h2 { font-size: 16px; font-weight: 800; color: var(--primary); }
.stb-text p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

.stb-score { text-align: center; flex-shrink: 0; }
.stb-score .big { font-size: 24px; font-weight: 900; color: var(--primary); }
.stb-score .small { font-size: 12px; color: var(--text-muted); }
.stb-score .pct {
  display: inline-block;
  font-size: 12px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 10px;
  margin-top: 3px;
}

/* Legend */
.legend {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  padding: 10px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 14px;
  font-size: 12px;
  color: var(--text-muted);
}

.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }
.dot-2 { background: var(--green); }
.dot-1 { background: var(--orange); }
.dot-0 { background: var(--red); }
.dot-na { background: var(--text-dim); }

/* Subsections */
.subsec-title {
  background: var(--primary-light);
  border: 1px solid var(--primary-mid);
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  padding: 8px 16px;
  font-size: 12px;
  font-weight: 700;
  color: var(--primary);
  margin-top: 14px;
}

.subsec-body {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 var(--radius-sm) var(--radius-sm);
}

/* Item Row */
.item-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 11px 14px;
  border-bottom: 1px solid var(--border-light);
  transition: background 0.12s;
}

.item-row:last-child { border-bottom: none; }
.item-row:hover { background: var(--surface2); }
.item-row.scored-2 { border-right: 6px solid var(--green); }
.item-row.scored-1 { border-right: 6px solid var(--orange); }
.item-row.scored-0 { border-right: 6px solid var(--red); }
.item-row.scored-na { border-right: 6px solid var(--text-dim); }

.item-num {
  min-width: 26px;
  height: 26px;
  background: var(--primary-light);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--primary);
  flex-shrink: 0;
  margin-top: 1px;
}

.item-text {
  flex: 1;
  font-size: 13px;
  line-height: 1.7;
  color: var(--text);
  white-space: pre-wrap;
  min-width: 0;
}

.item-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  flex-wrap: wrap;
  justify-content: flex-start;
}

/* Score Buttons */
.sbtn, .sbtn-disabled {
  width: 38px;
  height: 34px;
  border: 2px solid var(--border);
  border-radius: 7px;
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.12s;
  -webkit-user-select: none;
  user-select: none;
  touch-action: manipulation;
}

.sbtn {
  background: var(--surface2);
  color: var(--text-muted);
  cursor: pointer;
}

.sbtn:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: var(--primary-light);
}

.sbtn:active { transform: scale(0.94); }

.sbtn.s0 { background: var(--red-light); border-color: var(--red); color: var(--red); }
.sbtn.s1 { background: var(--orange-light); border-color: var(--orange); color: var(--orange); }
.sbtn.s2 { background: var(--green-light); border-color: var(--green); color: var(--green); }
.sbtn.sna { background: var(--border-light); border-color: var(--text-dim); color: var(--text-dim); }

.sbtn-disabled {
  background: #2c2c2c;
  border-color: #333;
  color: #aaa;
  cursor: not-allowed;
  opacity: 0.6;
  pointer-events: none;
}

/* Note Button */
.nbtn {
  height: 34px;
  padding: 0 8px;
  border: 1.5px solid var(--border);
  border-radius: 7px;
  background: transparent;
  color: var(--text-muted);
  font-family: 'Cairo', sans-serif;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.12s;
  touch-action: manipulation;
  display: flex;
  align-items: center;
  gap: 3px;
}

.nbtn:hover, .nbtn:active { border-color: var(--accent); color: var(--accent); }
.nbtn.has-note { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

/* Note Area */
.note-area { padding: 0 14px 10px 14px; display: none; }
.note-area.open { display: block; }
.note-area textarea {
  width: 100%;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  font-size: 12px;
  resize: vertical;
  min-height: 60px;
}
.note-area textarea:focus { outline: none; border-color: var(--accent); }

/* ========== SUMMARY ========== */
.summary-view { max-width: 900px; margin: 0 auto; }

.total-card {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  border-radius: var(--radius);
  padding: 20px 24px;
  color: #fff;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

.total-card .tc-left { flex: 1; min-width: 160px; }
.total-card h2 { font-size: 16px; font-weight: 800; }
.total-card p { font-size: 12px; opacity: 0.8; margin-top: 4px; }
.total-card .tc-right { text-align: center; }
.total-card .tc-score { font-size: 48px; font-weight: 900; line-height: 1; }
.total-card .tc-max { font-size: 14px; opacity: 0.75; margin-top: 4px; }
.total-card .tc-pct {
  font-size: 22px;
  font-weight: 800;
  margin-top: 8px;
  background: rgba(255, 255, 255, 0.2);
  padding: 4px 14px;
  border-radius: 20px;
  display: inline-block;
}

.sum-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}

.sum-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  transition: all 0.15s;
}

.sum-card:hover { border-color: var(--primary); box-shadow: var(--shadow); }
.sum-card-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.sum-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
.sum-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
.sum-scores { display: flex; align-items: center; justify-content: space-between; }
.sum-earned { font-size: 20px; font-weight: 900; color: var(--primary); }
.sum-max { font-size: 12px; color: var(--text-muted); }
.sum-pct { font-size: 13px; font-weight: 700; }

    /* ========== MOBILE BOTTOM NAV ========== */
    .mobile-nav {
        position: fixed;
        bottom: 0;
        right: 0;
        left: 0;
        /* Use the variable we defined in :root */
        height: var(--mob-nav-h);
        background: var(--surface);
        border-top: 1px solid var(--border);
        display: flex;
        z-index: 1000;
        box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.08);
        /* This is the key: it pushes the content of the nav up */
        padding-bottom: var(--safe-area-bottom);
        align-items: center;
    }

@media (min-width: 768px) {
  .mobile-nav { display: none; }
}

.mobile-nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-family: 'Cairo', sans-serif;
  transition: color 0.15s;
  touch-action: manipulation;
}

.mobile-nav-btn.active { color: var(--primary); }
.mobile-nav-btn .mn-icon { font-size: 20px; }
.mobile-nav-btn .mn-label { font-size: 10px; font-weight: 600; }

/* ========== SIDEBAR OVERLAY ========== */
/* ===== SIDEBAR OVERLAY ===== */
.sidebar-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: 140;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s ease;
}

.sidebar-overlay.show {
  opacity: 1;
  pointer-events: auto;
}

    /* ========== FIXED MOBILE LAYOUT ========== */
    @media (max-width: 767px) {
        .app-layout {
            position: fixed;
            top: var(--header-h);
            /* Set bottom to 0 to allow the background to fill the screen */
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            height: auto;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            /* IMPORTANT: This padding must be larger than the height of your bottom nav.
           We add 120px to ensure the rating buttons and notes clear the bar. */
            padding-bottom: calc(var(--mob-nav-h) + 120px) !important;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
        }

        .sidebar {
            position: fixed;
            top: var(--header-h);
            /* Ensure the sidebar doesn't go behind the bottom nav */
            bottom: var(--mob-nav-h);
            right: 0;
            width: 280px;
            z-index: 150;
            transform: translate3d(100%, 0, 0);
            transition: transform .28s cubic-bezier(.4, 0, .2, 1);
            will-change: transform;
        }

            .sidebar.open {
                transform: translate3d(0, 0, 0);
            }
    }


/* ========== TOAST ========== */
.toast {
  position: fixed;
  bottom: 70px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: #fff;
  border-radius: 24px;
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 600;
  box-shadow: var(--shadow-lg);
  z-index: 500;
  opacity: 0;
  transition: opacity 0.25s;
  pointer-events: none;
  white-space: normal;
  max-width: 90%;
  text-align: center;
}

@media (min-width: 768px) {
  .toast { bottom: 24px; }
}

.toast.show { opacity: 1; }

/* ========== MODAL ========== */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
  z-index: 400;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-bg.open { display: flex; }

.modal {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 24px;
  width: 100%;
  max-width: 420px;
  box-shadow: var(--shadow-lg);
}

.modal h3 { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
.modal p { font-size: 13px; color: var(--text-muted); line-height: 1.7; margin-bottom: 20px; }
.modal-btns { display: flex; gap: 10px; }

.btn {
  flex: 1;
  height: 40px;
  border-radius: var(--radius-sm);
  border: none;
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { background: #a93226; }
.btn-ghost { background: var(--border-light); color: var(--text-muted); }
.btn-ghost:hover { background: var(--border); }

/* ========== NAVIGATION BUTTONS ========== */
.sec-nav {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  flex-wrap: wrap;
}

.sec-nav-btn {
  flex: 1;
  min-width: 120px;
  height: 40px;
  border-radius: var(--radius-sm);
  border: none;
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  color: var(--text-muted);
}

.sec-nav-btn:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: var(--primary-light);
}

.sec-nav-btn.primary {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}

.sec-nav-btn.primary:hover { background: var(--primary-dark); }

/* ========== QUICK ACTIONS ========== */
.quick-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.qa-btn {
  flex: 1;
  min-width: 100px;
  height: 40px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface);
  font-family: 'Cairo', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.qa-btn:hover, .qa-btn:active {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}

.qa-btn.green { border-color: var(--green); color: var(--green); }
.qa-btn.green:hover { background: var(--green-light); }

/* ========== RESPONSIVE STYLES ========== */
@media (max-width: 599px) {
  .item-row { flex-wrap: wrap; }
  .item-controls { width: 100%; margin-top: 6px; }
  .sbtn { width: 44px; height: 38px; font-size: 14px; }
  .nbtn { height: 38px; font-size: 12px; flex: 1; justify-content: center; }
}

@media (max-width: 480px) {
  body { font-size: 13px; }
  .item-text { font-size: 12px; }
  .stb-text h2 { font-size: 14px; }
}

/* ========== TOUCH TARGETS ========== */
button, .nav-item, .nav-card, .qa-btn, .sec-nav-btn, .mobile-nav-btn, .hbtn {
  min-height: 44px;
}

/* ========== SCROLLBAR ========== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }

        "title": "3. تنظيم العمل:",
        "items": [
          {
            "text": "تواجد جداول عمل تنظيمية على مدار 24 ساعة لجميع العاملين بجميع أقسام المستشفى."

            "text": "تواجد العاملون طبقا لجداول العمل التنظيمية  بكل قسم."

            "text": "يوجد رئيس لكل وحدة / قسم له مهام ومسئوليات محددة  ( أمر تكليف موثق و معتمد)."

          {
            "text": "يلتزم جميع العاملين بالزى الخاص بهم  ."

        function getIOSVersion() {
            const ua = navigator.userAgent;
            if (/iP(hone|od|ad)/.test(ua)) {
                const match = ua.match(/OS (\d+)_/);
                if (match) return parseInt(match[1], 10);
            }
            return null; // not iOS
        }

        function shouldUseExternalTemplate() {
            const iosVersion = getIOSVersion();
            // Old iOS (<=15) -> external template (avoids base64 memory spike)
            if (iosVersion !== null && iosVersion <= 15) return true;
            // iOS 16+, Android, Desktop -> base64 (fast, no network needed)
            return false;
        }

            let offset = 0;
            for (const [name, rawData] of Object.entries(files)) {
                const nb = new TextEncoder().encode(name);
                let comp = rawData, cm = 0;
                if (_canCompress) {
                    try {
                        const cs = new CompressionStream('deflate-raw');
                        const writer = cs.writable.getWriter();
                        const reader = cs.readable.getReader();
                        const chunks = [];
                        const pump = () => reader.read().then(({ done, value }) => {
                            if (done) return;

                        });
                        writer.write(rawData); writer.close();

            out.set(eocd, pos);
            return out;

        // Patch a single cell: preserve s= style attribute, update value
        function patchCell(sheet, cellRef, value) {
            const esc = v => String(v).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const repl = (m, attrs) => {
                const a = attrs.replace(/\s*t="[^"]*"/g, '');
                if (value === null || value === '' || value === undefined) return '<c r="' + cellRef + '"' + a + '/>';
                if (typeof value === 'number') return '<c r="' + cellRef + '"' + a + '><v>' + value + '</v></c>';
                return '<c r="' + cellRef + '"' + a + ' t="str"><v>' + esc(value) + '</v></c>';
            };
            // Self-closing: <c r="I13" s="4"/>
            sheet = sheet.replace(new RegExp('<c r="' + cellRef + '"([^/]*)/>'), repl);
            // With content: <c r="I13" s="4" t="s"><v>...</v></c>
            sheet = sheet.replace(new RegExp('<c r="' + cellRef + '"([^>]*)>[\s\S]*?<\/c>'), repl);
            return sheet;
        }

        // Patch sharedString at index: append user value as second rich-text run
        function patchSharedString(ss, index, userValue) {
            const esc = v => String(v).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const vRun = '<r><rPr><sz val="16"/><rFont val="Times New Roman"/><family val="1"/></rPr><t xml:space="preserve"> ' + esc(userValue) + '</t></r>';
            let i = -1;
            return ss.replace(/<si>([\s\S]*?)<\/si>/g, (m, inner) => {
                i++;
                return i === index ? '<si>' + inner + vRun + '</si>' : m;
            });
        }

        // Read a cell value from sheet XML
        function readCellValue(sheet, cellRef) {
            const m = sheet.match(new RegExp('<c r="' + cellRef + '"[^>]*>[^<]*<v>([^<]*)<\/v>'));
            return m ? m[1] : '';
        }

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            showToast('جاري قراءة الملف...');
            try {
                const buf = new Uint8Array(await file.arrayBuffer());
                const files = await zipRead(buf);
                const sheet = new TextDecoder().decode(files['xl/worksheets/sheet1.xml']);
                const ss_xml = new TextDecoder().decode(files['xl/sharedStrings.xml']);

                // ── READ METADATA from sheet2 cells ──
                const sheet2_xml = new TextDecoder().decode(files['xl/worksheets/sheet2.xml']);

                // Read a cell value from any sheet xml (handles t="s", t="str", numeric)
                const readSheetCell = (sheetXml, sharedStrings, cellRef) => {
                    const re = new RegExp('<c\\s[^>]*r="' + cellRef + '"[^>]*>[\\s\\S]*?<\/c>');
                    const m = sheetXml.match(re);
                    if (!m) return '';
                    const xml = m[0];
                    const v = xml.match(/<v>([^<]*)<\/v>/);
                    if (!v) return '';
                    if (/\bt="s"/.test(xml)) return sharedStrings[parseInt(v[1])] || '';
                    if (/\bt="str"/.test(xml)) return v[1];
                    return v[1];
                };

                // Parse shared strings for metadata reading
                const ssItems = [];
                ss_xml.replace(/<si>([\s\S]*?)<\/si>/g, (m, inner) => {
                    let txt = '';
                    inner.replace(/<t[^>]*>([^<]*)<\/t>/g, (_, t) => { txt += t; });
                    ssItems.push(txt.trim());
                });

                // Read metadata from sheet2
                
                const rawDates = readSheetCell(sheet2_xml, ssItems, 'F1');
                const rawHosp = readSheetCell(sheet2_xml, ssItems, 'D2');
                const rawInsp = readSheetCell(sheet2_xml, ssItems, 'F2');
                const rawType = readSheetCell(sheet2_xml, ssItems, 'D3');

                
                meta.dates = rawDates.trim();
                meta.hospitalName = rawHosp.trim();
                meta.inspectors = rawInsp.trim();
                meta.type = rawType.trim();

                // ── READ SCORES: col C = numeric score (0/1/2) or 'NA', col D = notes ──
                scores = {};
                FORM_DATA.forEach(sec => {
                    let idx = 0;
                    sec.subsections.forEach(sub => sub.items.forEach(item => {
                        const mapKey = sec.key + '__' + idx;
                        const exRow = ROW_MAP[mapKey];
                        if (exRow) {
                            // Read col C for score
                            const cAddr = 'C' + exRow;
                            const cRe = new RegExp('<c\\s[^>]*r="' + cAddr + '"(?=[">/ ])[^>]*>(?:(?!<\/row>)[\\s\\S])*?<\/c>');
                            const cMatch = sheet.match(cRe);
                            if (cMatch) {
                                const vMatch = cMatch[0].match(/<v>([^<]*)<\/v>/);
                                if (vMatch) {
                                    let val = vMatch[1].trim();
                                    // Resolve shared string (t="s") — e.g. N/A stored as shared string index
                                    if (/\bt="s"/.test(cMatch[0])) {
                                        const ssIdx = parseInt(val);
                                        if (!isNaN(ssIdx) && ssItems[ssIdx] !== undefined) {
                                            val = ssItems[ssIdx];
                                        }
                                    }
                                    if (val === 'N/A') scores[mapKey] = 'N/A';
                                    else if (val === '0' || val === '0.0') scores[mapKey] = 0;
                                    else if (val === '1' || val === '1.0') scores[mapKey] = 1;
                                    else if (val === '2' || val === '2.0') scores[mapKey] = 2;
                                }
                            }
                            // Read col D for notes (resolve shared strings if t="s")
                            const dAddr = 'D' + exRow;
                            const dRe = new RegExp('<c\\s[^>]*r="' + dAddr + '"(?=[">/ ])[^>]*>(?:(?!<\/row>)[\\s\\S])*?<\/c>');
                            const dMatch = sheet.match(dRe);
                            if (dMatch) {
                                const vMatch = dMatch[0].match(/<v>([^<]*)<\/v>/);
                                if (vMatch && vMatch[1].trim()) {
                                    if (/\bt="s"/.test(dMatch[0])) {
                                        // Shared string: look up in ssItems array
                                        const ssIdx = parseInt(vMatch[1].trim());
                                        if (!isNaN(ssIdx) && ssItems[ssIdx]) notes[mapKey] = ssItems[ssIdx];
                                    } else {
                                        notes[mapKey] = vMatch[1].trim();
                                    }
                                }
                            }
                        }
                        idx++;
                    }));
                });
                updateMetaResult();
                saveToLocal();
                buildSidebarNav();
                updateProgress();
                showHome();
                showToast('✓ تم تحميل: ' + (meta.hospitalName || file.name));
            } catch (e) {
                console.error(e);
                showToast('خطأ في قراءة الملف: ' + e.message);
            }
            event.target.value = '';
        }
function forceRecalculation(workbookXml) {
    // Add fullCalcOnLoad attribute to force recalculation when opening
    if (workbookXml.includes('<calcPr')) {
        workbookXml = workbookXml.replace(/<calcPr[^>]*\/>/, '<calcPr calcId="1" fullCalcOnLoad="1"/>');
    } else {
        workbookXml = workbookXml.replace(/(<\/workbook>)/, '<calcPr calcId="1" fullCalcOnLoad="1"/>$1');
    }
    return workbookXml;
}
        async function exportExcel() {
            showToast('جاري تجهيز الملف...');
            await new Promise(r => setTimeout(r, 50)); // yield to UI thread
            try {
			
                // Load template: external file for iOS ≤15, base64 for iOS 16+ / Android / Desktop
                const templateBuf = await loadTemplateHybrid();

                // Unzip template — preserves ALL files (images, styles, drawings...)
                const files = await zipRead(templateBuf);
                let sheet = new TextDecoder().decode(files['xl/worksheets/sheet1.xml']);
                let ss = new TextDecoder().decode(files['xl/sharedStrings.xml']);

                showToast('جاري كتابة البيانات...');
                await new Promise(r => setTimeout(r, 30));
// After reading template files, before patching
let workbook = new TextDecoder().decode(files['xl/workbook.xml']);
workbook = forceRecalculation(workbook);
files['xl/workbook.xml'] = new TextEncoder().encode(workbook);
                // ── METADATA: write to sheet2 cells ──
                // Sheet2 layout: B1=governorate, F1=dates, B2=hospitalName, F2=inspectors, B3=type
                let sheet2 = new TextDecoder().decode(files['xl/worksheets/sheet2.xml']);
                
                sheet2 = patchCell(sheet2, 'F1', meta.dates || '');
                sheet2 = patchCell(sheet2, 'D2', meta.hospitalName || '');
                sheet2 = patchCell(sheet2, 'F2', meta.inspectors || '');
                sheet2 = patchCell(sheet2, 'D3', meta.type || '');

                // ── ITEM SCORES: col C = score (0/1/2/N/A), col D = notes ──
                FORM_DATA.forEach(sec => {
                    let idx = 0;
                    sec.subsections.forEach(sub => sub.items.forEach(item => {
                        const ik = `${sec.key}__${idx}`;
                        const xRow = ROW_MAP[ik];
                        if (xRow) {
                            const sc = scores[ik];
                            // Write numeric score (0,1,2) or 'N/A' to col C
                            if (sc === 'N/A') sheet = patchCell(sheet, 'C' + xRow, 'N/A');
                            else if (sc !== undefined && sc !== null) sheet = patchCell(sheet, 'C' + xRow, sc);
                            else sheet = patchCell(sheet, 'C' + xRow, '');
                            // Notes to col D
                            sheet = patchCell(sheet, 'D' + xRow, notes[ik] || '');
                        }
                        idx++;
                    }));
                });

                // ── PUT BACK & REZIP ──
                // Section percentages are auto-calculated by Excel formulas in sheet2
                files['xl/worksheets/sheet1.xml'] = new TextEncoder().encode(sheet);
                files['xl/worksheets/sheet2.xml'] = new TextEncoder().encode(sheet2);

                showToast('جاري ضغط الملف...');
                await new Promise(r => setTimeout(r, 30));
                const result = await zipWrite(files);

                // ── DOWNLOAD ──
                const fname = `الاسكندرية_${meta.hospitalName || 'مستشفى'}_${meta.dates || new Date().toISOString().slice(0, 10)}.xlsx`;
                const blob = new Blob([result], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                const url2 = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url2; a.download = fname;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(url2), 10000);
                showToast('✓ تم تصدير الملف بنجاح مع كامل التنسيق');
            } catch (e) {
                console.error(e);
                showToast('خطأ في التصدير: ' + e.message);
            }
        }

        // ═══════════════════════════════════════
        // LOCAL STORAGE
        // ═══════════════════════════════════════
        let saveTimer;
        function debounceSave() { clearTimeout(saveTimer); saveTimer = setTimeout(saveToLocal, 800); }
        function saveToLocal() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ scores, notes, meta, savedAt: new Date().toISOString() }));
                showToast('✓ تم الحفظ');
            } catch (e) { showToast('تعذر الحفظ'); }
        }
        function loadFromLocal() {
    try {
        const d = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
        if (d) {
            scores = d.scores || {};
            notes = d.notes || {};  // Make sure this line exists
            meta = { ...meta, ...(d.meta || {}) };
            
            updateMetaResult();
            buildSidebarNav();
            updateProgress();
            
            if (currentSection !== 'home' && currentSection !== 'summary') {
                showSection(currentSection);
            } else if (currentSection === 'home') {
                showHome();
            } else if (currentSection === 'summary') {
                renderSummary();
            }
            
            showToast('تم استعادة البيانات المحفوظة');
        }
    } catch (e) { }
}
        function confirmClear() {
            openModal('مسح جميع البيانات', 'هل أنت متأكد؟ سيتم حذف جميع التقييمات والملاحظات.', () => {

                localStorage.removeItem(STORAGE_KEY);

        // ═══════════════════════════════════════
        // MODAL / TOAST
        // ═══════════════════════════════════════
        let _mcb = null;
        function openModal(title, body, cb) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').textContent = body;
            _mcb = cb;
            document.getElementById('modalBg').classList.add('open');
            document.getElementById('modalConfirm').onclick = () => { closeModal(); if (_mcb) _mcb(); };
        }
        function closeModal() { document.getElementById('modalBg').classList.remove('open'); }
        let _toastTimer;
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            clearTimeout(_toastTimer); _toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
        }

        // ═══════════════════════════════════════
        // UTILS
        // ═══════════════════════════════════════
        function esc(s) {
            return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

<script>
    // Install banner - runs after DOM is ready
    let deferredPrompt;
    const installBanner = document.getElementById('installBanner');
    const btnInstall = document.getElementById('btnInstall');
    const btnCancel = document.getElementById('btnCancel');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBanner.style.display = 'block';

        btnInstall.addEventListener('click', () => {
            installBanner.style.display = 'none';
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') {
                    console.log('User accepted the install prompt');
                } else {
                    console.log('User dismissed the install prompt');
                }
                deferredPrompt = null;
            });
        });
    });

    btnCancel.addEventListener('click', () => {
        installBanner.style.display = 'none';
    });

    window.addEventListener('appinstalled', () => {
        installBanner.style.display = 'none';
    });
	function scrollToNextUnanswered() {
    const allRows = document.querySelectorAll('.item-row');
    for (let row of allRows) {
        // Check if the row has any of the 'scored' classes
        const isAnswered = row.classList.contains('scored-0') || 
                           row.classList.contains('scored-1') || 
                           row.classList.contains('scored-2') || 
                           row.classList.contains('scored-na');
        if (!isAnswered) {
            row.scrollIntoView({ behavior: 'smooth', block: 'center' });
            row.style.outline = '2px solid #e8a020'; // Temporary highlight
            setTimeout(() => row.style.outline = 'none', 2000);
            return;
        }
    }
    alert("All questions in this section are answered!");
}
